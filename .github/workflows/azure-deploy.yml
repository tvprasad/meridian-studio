name: Azure Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: meridian-studio

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Log in to Azure Container Registry ──────────────────────────────────
      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── Build & push Docker image ────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --build-arg "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}" \
            --build-arg "VITE_MCP_BASE_URL=${{ vars.VITE_MCP_BASE_URL }}" \
            --build-arg "VITE_AUTH_ENABLED=${{ vars.VITE_AUTH_ENABLED }}" \
            --build-arg "VITE_AZURE_CLIENT_ID=${{ vars.VITE_AZURE_CLIENT_ID }}" \
            --build-arg "VITE_AZURE_TENANT_ID=${{ vars.VITE_AZURE_TENANT_ID }}" \
            --build-arg "VITE_AZURE_REDIRECT_URI=${{ vars.VITE_AZURE_REDIRECT_URI }}" \
            --build-arg "VITE_AZURE_API_SCOPE=${{ vars.VITE_AZURE_API_SCOPE }}" \
            --build-arg "VITE_APPINSIGHTS_CONNECTION_STRING=${{ vars.VITE_APPINSIGHTS_CONNECTION_STRING }}" \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      # ── Deploy to Azure Container Apps ─────────────────────────────────────
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: meridian-studio
          resourceGroup: meridian-rg
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
